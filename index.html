<br><br>

<button onclick="submitGuest()">Submit</button>

    <script>
async function submitGuest() {
  const name = document.getElementById("name").value;
  const meal = document.querySelector('input[name="meal"]:checked');

  if (!name || !meal) {
    alert("Please enter name and choose a meal");
    return;
  }

  const { data, error } = await supabase
    .from("guests")
    .insert([
      {
        guest_name: name,
        meal_choice: meal.value
      }
    ]);

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Submitted!");
  }
}

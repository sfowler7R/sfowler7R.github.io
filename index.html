<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://kjkdpwiuurrffvddcdrn.supabase.co/rest/v1/",
  "sb_publishable_WrkSdWLLjfkXS2elb-DRIg_F8WEFeca"
);

async function submitGuest() {
  const name = document.getElementById("name").value;
  const meal = document.querySelector('input[name="meal"]:checked');

  if (!name || !meal) {
    alert("Please enter name and choose a meal");
    return;
  }

  const { error } = await supabaseClient
    .from("guests")
    .insert([
      {
        guest_name: name,
        meal_choice: meal.value
      }
    ]);

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Submitted!");
  }
}
</script>

            <p>This is my homepage.</p>
        </main>

    </div>
</body>
</html>
